services:
  smash-bash:
    build: .
    container_name: smash-bash
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3001}
      TRUST_TAILSCALE: ${TRUST_TAILSCALE:-1}
      DB_PATH: /app/server/data/smashbash.db
    volumes:
      - smashbash-data:/app/server/data

volumes:
  smashbash-data:
